name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys overwriting each other
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # The Entra Application (client) ID is injected as a build-time env var.
      # Configure it as a repo secret named AZURE_CLIENT_ID.
      # Tenant defaults to "organizations" (multi-tenant) — override with
      # AZURE_TENANT_ID secret if you want to lock to a specific tenant.
      - name: Build
        env:
          VITE_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # Project-pages base path. Auto-detected from the repo name.
          # If you deploy to a user/org page or a custom domain, override
          # this in the repo's Variables (BASE_PATH = "/").
          VITE_BASE: ${{ vars.BASE_PATH || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
